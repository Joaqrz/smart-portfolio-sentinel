version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sentinel_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - sentinel_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sentinel_private_net

volumes:
  sentinel_db_data:
    name: sentinel_db_data

networks:
  sentinel_private_net:
    name: sentinel_private_net
    driver: bridge